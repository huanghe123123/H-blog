name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # =========================================================================
  # 前端：构建 → 部署到 GitHub Pages
  # =========================================================================
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
          cname: ${{ vars.CNAME }}

  # =========================================================================
  # 后端：构建 Docker 镜像 → 推送到阿里云 ACR
  # =========================================================================
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | \
            docker login -u "${{ secrets.ACR_USERNAME }}" \
            --password-stdin "${{ secrets.ACR_REGISTRY }}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/blog-backend:latest
            ${{ secrets.ACR_REGISTRY }}/blog-backend:${{ github.sha }}
