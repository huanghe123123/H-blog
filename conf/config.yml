# =============================================================================
# Blog 站点配置文件
# 部署前请根据实际情况修改以下配置项
# =============================================================================

# ---------------------------------------------------------------------------
# 站点身份
# ---------------------------------------------------------------------------
site:
  # 博客名称，会显示在页面标题、导航栏、登录页等位置
  name: "H-blog"
  # 名称文字颜色（CSS 颜色值）
  name_color: "#1f2d3d"
  # 副标题或简介（可选，支持 Markdown）
  description: "这是huanghe123123~~采用vibe coding方法~~制作的基于react和fastapi的博客网站"
  # 简介文字颜色（CSS 颜色值）
  description_color: "#87cefa"
  # 站长的用户 ID，设为 0 则自动使用第一个注册用户
  owner: 1 

# ---------------------------------------------------------------------------
# 服务端口
# ---------------------------------------------------------------------------
server:
  # 后端监听地址和端口
  backend_host: "0.0.0.0"
  backend_port: 7000
  # 前端开发服务器端口
  frontend_dev_port: 5173
  # API 路径前缀，一般不需要改
  api_prefix: "/api"

# ---------------------------------------------------------------------------
# 数据库
# ---------------------------------------------------------------------------
database:
  host: "postgres"       # Docker Compose 内用服务名，外部部署改为实际 IP
  port: 5432
  user: "huanghe123123"
  password: "1234567890yyt"       # 生产环境务必修改
  name: "blog"

# ---------------------------------------------------------------------------
# 认证与安全
# ---------------------------------------------------------------------------
auth:
  # JWT 签名密钥，生产环境用 openssl rand -hex 32 生成
  secret_key: "dac72c6d9751c3bf1d9b290dd0f1e9e6ec1ed15a7b71288f9efc7b63292b3689"
  # JWT 签名算法
  algorithm: "HS256"
  # Access token 有效期（分钟），默认 15 分钟
  access_token_expire_minutes: 15
  # Refresh token 有效期（天），默认 7 天
  refresh_token_expire_days: 7
  # Cookie secure 属性，生产环境必须为 true
  cookie_secure: true
  # Cookie SameSite，lax 适用于大多数场景
  cookie_samesite: "lax"
  # 邮箱验证 token 有效期（秒），默认 20 分钟
  verification_token_expire_seconds: 1200

# ---------------------------------------------------------------------------
# 邮件（邮箱验证用）
# ---------------------------------------------------------------------------
email:
  # 开发环境用 Mailpit/Mailhog（端口 1025），无需认证
  smtp_host: "smtp.qq.com"
  smtp_port: 465
  smtp_user: "2301319759@qq.com"
  smtp_password: "uscihhznhyftebjj"
  from_address: "2301319759@qq.com"

# ---------------------------------------------------------------------------
# 前端
# ---------------------------------------------------------------------------
frontend:
  # 前端访问地址（用于构造验证链接等）
  url: "https://blog.huanghe123123.asia"
  # CORS 允许的来源，生产环境改为实际域名
  cors_origins:
    - "http://localhost:5173"
    - "http://127.0.0.1:5173"
    - "https://blog.huanghe123123.asia"

# ---------------------------------------------------------------------------
# 主题外观
# ---------------------------------------------------------------------------
theme:
  # Ant Design 主色调
  primary_color: "#1f6feb"
  # 圆角大小
  border_radius: 6
  # 界面语言: "zh-CN" 中文 / "en-US" 英文（英文需自行翻译前端文案）
  locale: "zh-CN"

# ---------------------------------------------------------------------------
# 首页
# ---------------------------------------------------------------------------
home:
  greeting_enabled: true   # 首页顶部按时段显示问候语
  tagline: ""              # 站名下方小标语，留空则不显示

# ---------------------------------------------------------------------------
# GitHub OAuth 授权登录
# 在 https://github.com/settings/developers 创建 OAuth App 后填入下列信息
# 上线后请将 redirect_uri 改为 https://你的域名/api/auth/github/callback
# ---------------------------------------------------------------------------
github:
  client_id: "Ov23linl4usIocovIZdy"
  client_secret: "b1360350c7e16cbc1377e16f92de0eda15b063bb"
  redirect_uri: "https://api.huanghe123123.asia/api/auth/github/callback"

# ---------------------------------------------------------------------------
# 功能开关
# ---------------------------------------------------------------------------
features:
  # 是否要求邮箱验证后才能登录
  email_verification: true
  # 是否开启评论
  comments_enabled: true
  # 是否开启点赞
  likes_enabled: true
