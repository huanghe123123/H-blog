# =============================================================================
# Blog 站点配置文件（可提交，不含密钥）
# 密钥和密码请放在项目根目录的 .env 文件中
# =============================================================================

# ---------------------------------------------------------------------------
# 站点身份
# ---------------------------------------------------------------------------
site:
  name: "H-Blog"
  name_color: "#1f2d3d"
  description: "这是huanghe123123~~采用vibe coding方法~~制作的基于react和fastapi的博客网站"
  description_color: "#87cefa"

# ---------------------------------------------------------------------------
# 服务端口
# ---------------------------------------------------------------------------
server:
  backend_host: "0.0.0.0"
  backend_port: 7000
  frontend_dev_port: 5173
  api_prefix: "/api"

# ---------------------------------------------------------------------------
# 数据库（连接信息；凭据通过 .env 的 DATABASE_URL 注入）
# ---------------------------------------------------------------------------
database:
  host: "postgres"
  port: 5432
  name: "blog"

# ---------------------------------------------------------------------------
# 认证与安全（密钥通过 .env 的 SECRET_KEY 注入）
# ---------------------------------------------------------------------------
auth:
  algorithm: "HS256"
  access_token_expire_minutes: 15
  refresh_token_expire_days: 7
  cookie_secure: true
  cookie_samesite: "lax"
  verification_token_expire_seconds: 1200

# ---------------------------------------------------------------------------
# 邮件（凭据通过 .env 注入）
# ---------------------------------------------------------------------------
email:
  smtp_host: "smtp.qq.com"
  smtp_port: 465

# ---------------------------------------------------------------------------
# 前端
# ---------------------------------------------------------------------------
frontend:
  url: "http://localhost:5173" #改为你的域名
  cors_origins:
    - "http://localhost:5173"
    - "http://127.0.0.1:5173"
    # 添加你的域名

# ---------------------------------------------------------------------------
# 主题外观
# ---------------------------------------------------------------------------
theme:
  primary_color: "#1f6feb"
  border_radius: 6
  locale: "zh-CN"

# ---------------------------------------------------------------------------
# 首页
# ---------------------------------------------------------------------------
home:
  greeting_enabled: true   # 首页顶部按时段显示问候语（早安 / 午安 / 晚上好）
  tagline: ""              # 站名下方的一行小标语/署名，留空则不显示（例：React · FastAPI · 用爱发电）

# ---------------------------------------------------------------------------
# GitHub OAuth（client_secret 通过 .env 注入）
# ---------------------------------------------------------------------------
github:
  client_id: ""
  redirect_uri: "http://localhost:5173/api/auth/github/callback"

# ---------------------------------------------------------------------------
# 功能开关
# ---------------------------------------------------------------------------
features:
  email_verification: false  # 本地测试关闭，生产通过 .env 覆盖
  comments_enabled: true
  likes_enabled: true
  agent: false              # AI Agent 功能（POST /api/agent）
  mcp: false                # MCP API Key 认证