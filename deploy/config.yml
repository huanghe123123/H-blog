# =============================================================================
# Blog 站点配置文件 — 部署用（可提交，不含密钥）
# 密钥和密码请放在项目根目录的 .env 文件中
# =============================================================================

# ---------------------------------------------------------------------------
# 站点身份
# ---------------------------------------------------------------------------
site:
  name: "H-Blog"
  name_color: "#1f2d3d"
  description: "这是huanghe123123~~采用vibe coding方法~~制作的基于react和fastapi的博客网站"
  description_color: "#87cefa"
  # 站主 ID 已移至 .env 的 SITE_OWNER

# ---------------------------------------------------------------------------
# 服务端口
# ---------------------------------------------------------------------------
server:
  backend_host: "0.0.0.0"
  backend_port: 7000
  frontend_dev_port: 5173
  api_prefix: "/api"

# ---------------------------------------------------------------------------
# 数据库（凭据通过 .env 的 DATABASE_URL 注入）
# ---------------------------------------------------------------------------
database:
  host: "postgres"
  port: 5432
  name: "blog"

# ---------------------------------------------------------------------------
# 认证与安全（密钥通过 .env 的 SECRET_KEY 注入）
# ---------------------------------------------------------------------------
auth:
  algorithm: "HS256"
  access_token_expire_minutes: 15
  refresh_token_expire_days: 7
  cookie_secure: true
  cookie_samesite: "lax"
  verification_token_expire_seconds: 1200

# ---------------------------------------------------------------------------
# 邮件（凭据通过 .env 注入）
# ---------------------------------------------------------------------------
email:
  smtp_host: "smtp.qq.com"
  smtp_port: 465

# ---------------------------------------------------------------------------
# 前端
# ---------------------------------------------------------------------------
frontend:
  url: "https://blog.huanghe123123.asia"
  cors_origins:
    - "http://localhost:5173"
    - "http://127.0.0.1:5173"
    - "https://blog.huanghe123123.asia"

# ---------------------------------------------------------------------------
# 主题外观
# ---------------------------------------------------------------------------
theme:
  primary_color: "#1f6feb"
  border_radius: 6
  locale: "zh-CN"

# ---------------------------------------------------------------------------
# 首页
# ---------------------------------------------------------------------------
home:
  greeting_enabled: true
  tagline: ""

# ---------------------------------------------------------------------------
# GitHub OAuth（client_secret 通过 .env 注入）
# ---------------------------------------------------------------------------
github:
  client_id: "Ov23linl4usIocovIZdy"
  redirect_uri: "https://api.huanghe123123.asia/api/auth/github/callback"

# ---------------------------------------------------------------------------
# 功能开关
# ---------------------------------------------------------------------------
features:
  email_verification: true
  comments_enabled: true
  likes_enabled: true
  agent: false
  mcp: false
