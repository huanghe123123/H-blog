<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Restore SPA path after GitHub Pages 404 fallback
      (function(){var r=sessionStorage.getItem("redirect");if(r){sessionStorage.removeItem("redirect");var u=new URL(r);history.replaceState(null,"",u.pathname+u.search+u.hash)}})();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
